<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>MiniJira — Prototipo</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="styles.css"/>
<style>
  html, body, #root { height: 100%; margin: 0; background: #f3f3f6; }
  /* canvas tweaks */
  body { font-family: 'Inter', system-ui, sans-serif; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<!-- Design canvas framework -->
<script type="text/babel" src="design-canvas.jsx"></script>

<!-- Shared primitives -->
<script type="text/babel" src="components/data.jsx"></script>
<script type="text/babel" src="components/ui.jsx"></script>
<script type="text/babel" src="components/shell.jsx"></script>

<!-- Screens -->
<script type="text/babel" src="screens/Login.jsx"></script>
<script type="text/babel" src="screens/Projects.jsx"></script>
<script type="text/babel" src="screens/Board.jsx"></script>
<script type="text/babel" src="screens/TicketDetail.jsx"></script>
<script type="text/babel" src="screens/CreateTicket.jsx"></script>
<script type="text/babel" src="screens/Dashboard.jsx"></script>
<script type="text/babel" src="screens/Archived.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

function App() {
  return (
    <DesignCanvas
      title="MiniJira — MVP"
      subtitle="Flujo completo del prototipo · Diseño inspirado en Apple · Español"
    >
      <DCSection id="s-auth" title="1. Autenticación">
        <DCArtboard id="a-login" label="Login" width={1280} height={820}>
          <LoginScreen/>
        </DCArtboard>
        <DCArtboard id="a-login-err" label="Login — credenciales inválidas" width={1280} height={820}>
          <LoginErrorScreen/>
        </DCArtboard>
      </DCSection>

      <DCSection id="s-projects" title="2. Proyectos">
        <DCArtboard id="a-projects" label="Listado de proyectos" width={1440} height={900}>
          <ProjectsScreen/>
        </DCArtboard>
        <DCArtboard id="a-archived" label="Archivados" width={1440} height={900}>
          <ArchivedScreen/>
        </DCArtboard>
      </DCSection>

      <DCSection id="s-tickets" title="3. Tickets — Tablero, filtros y búsqueda">
        <DCArtboard id="a-board" label="Tablero Kanban (3 columnas · filtros)" width={1440} height={900}>
          <BoardScreen/>
        </DCArtboard>
        <DCArtboard id="a-board-empty" label="Búsqueda sin resultados" width={1440} height={900}>
          <BoardScreen variant="empty-filter"/>
        </DCArtboard>
        <DCArtboard id="a-create" label="Crear ticket" width={1440} height={900}>
          <CreateTicketScreen/>
        </DCArtboard>
      </DCSection>

      <DCSection id="s-detail" title="4. Detalle de ticket · Comentarios · Pessimistic Locking">
        <DCArtboard id="a-detail" label="Detalle con bloqueo propio" width={1440} height={900}>
          <TicketDetailScreen variant="default"/>
        </DCArtboard>
        <DCArtboard id="a-locked" label="En edición por otro usuario" width={1440} height={900}>
          <TicketDetailScreen variant="locked"/>
        </DCArtboard>
        <DCArtboard id="a-expired" label="Bloqueo expirado" width={1440} height={900}>
          <TicketDetailScreen variant="expired"/>
        </DCArtboard>
      </DCSection>

      <DCSection id="s-metrics" title="5. Dashboard de métricas">
        <DCArtboard id="a-dashboard" label="Métricas del proyecto" width={1440} height={980}>
          <DashboardScreen/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
